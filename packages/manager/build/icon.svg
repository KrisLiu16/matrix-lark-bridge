<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="larkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded rectangle background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Terminal/bot shape (scaled from 24x24 to fit ~320px centered) -->
  <g transform="translate(96, 80) scale(13.3)">
    <path d="M23 16.6764L18.9113 20.9328H14.4769V17.5449H11.0889V20.9328H8.71099V17.5448H5.32298V20.9328H1V7.4685L5.2256 3.06738H23V16.6764Z" fill="rgba(255,255,255,0.95)"/>
  </g>

  <!-- Screen/eyes area -->
  <g transform="translate(96, 80) scale(13.3)">
    <rect x="7" y="6.5" width="3.2" height="3.2" rx="0.6" fill="url(#bgGrad)"/>
    <rect x="13.8" y="6.5" width="3.2" height="3.2" rx="0.6" fill="url(#bgGrad)"/>
    <!-- Mouth -->
    <rect x="9" y="12" width="6" height="1.5" rx="0.4" fill="url(#bgGrad)" opacity="0.6"/>
  </g>

  <!-- Lark badge (bottom-right corner) -->
  <g transform="translate(320, 340)">
    <!-- Badge background -->
    <circle cx="80" cy="80" r="80" fill="url(#larkGrad)"/>
    <circle cx="80" cy="80" r="74" fill="none" stroke="white" stroke-width="4" opacity="0.3"/>
    <!-- Lark bird silhouette (simplified) -->
    <g transform="translate(38, 35) scale(1.8)">
      <path d="M12 4C8.5 4 6 6 5 8L2 14C2 14 6 12 9 13C10 13.3 11 14 12 16C13.5 14 15 12.5 17 12C19 11.5 22 12 22 12L19 8C18 6 15.5 4 12 4Z" fill="white" opacity="0.95"/>
      <path d="M9 13C6 12 2 14 2 14L5 18C6 19 8 20 10 19C11 18.5 11.5 17 12 16C11 14 10 13.3 9 13Z" fill="white" opacity="0.7"/>
    </g>
    <!-- "Lark" text -->
    <text x="80" y="140" text-anchor="middle" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="700" fill="white" letter-spacing="2">LARK</text>
  </g>
</svg>
